name: Build and Release the Sidekick RC library

on:
  push:
    tags:
      - "lib-v*"

permissions:
  contents: write   # REQUIRED for tag-triggered releases

jobs:
  build-android-library:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------
      # Checkout repository
      # ------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------
      # Extract version from tag
      # Tag format: lib-v1.2.3
      # ------------------------------
      - name: Extract version
        shell: bash
        run: |
          RAW_TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${RAW_TAG#lib-v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # ------------------------------
      # Install JDK 17 (FTC-compatible)
      # ------------------------------
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ------------------------------
      # Install Android SDK + build-tools
      # ------------------------------
      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform + build-tools
        run: |
          sdkmanager "platform-tools" \
                     "platforms;android-30" \
                     "build-tools;30.0.3"

      # ------------------------------
      # Make Gradle wrapper executable
      # ------------------------------
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ------------------------------
      # Build Android library (AAR)
      # ------------------------------
      - name: Build library
        run: ./gradlew clean assembleRelease

      # ------------------------------
      # Upload AAR to GitHub Release
      # ------------------------------
      - name: Upload AAR to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Sidekick RC library v${{ env.VERSION }}"
          body: |
            Add this library to your FTC robot's build.gradle with the following command:

            ```
            implementation 'com.github.Loonybot:SidekickRC:lib-v${{ env.VERSION }}'
            ```
            
            You can usually ignore the assets below.
          files: |
            **/build/outputs/aar/*release.aar

      # ------------------------------
      # Trigger JitPack prebuild
      # ------------------------------
      - name: Trigger JitPack build
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Triggering JitPack build for ${TAG}"
          curl -s "https://jitpack.io/com/github/Loonybot/SidekickRC/${TAG}/build.log" || true
